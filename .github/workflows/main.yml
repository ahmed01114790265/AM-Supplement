name: Full Deployment Pipeline

on:
  push:
    branches: [ "master" ]

env:
  AZURE_WEBAPP_NAME: AM-SupplementWEB
  WORKING_DIRECTORY: AM-Supplement.Presentation
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Restore dependencies
        run: dotnet restore ${{ env.WORKING_DIRECTORY }}
        
      - name: Build Project
        run: dotnet build ${{ env.WORKING_DIRECTORY }} --configuration Release --no-restore
        
      - name: Publish App
        run: dotnet publish ${{ env.WORKING_DIRECTORY }} -c Release -o ${{env.DOTNET_ROOT}}/myapp
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist
          
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
